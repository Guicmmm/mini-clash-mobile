<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Mini Clash Mobile - Um jogo de estratégia em tempo real para mobile">
    <meta name="theme-color" content="#222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mini Clash">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23222' width='192' height='192'/><text x='96' y='110' font-size='80' font-weight='bold' fill='%2300ffcc' text-anchor='middle' font-family='Arial'>⚔</text></svg>">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23222' width='192' height='192'/><text x='96' y='110' font-size='80' font-weight='bold' fill='%2300ffcc' text-anchor='middle' font-family='Arial'>⚔</text></svg>">
    
    <title>Mini Clash Mobile</title>
    <style>
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-touch-callout: none;
        }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            position: fixed;
            overflow: hidden;
        }
        
        body { 
            font-family: Arial, sans-serif; 
            background: #222; 
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            padding: max(0px, env(safe-area-inset-top)) 0 0 0;
            height: 100vh;
        }
        
        canvas { 
            background: #45a049; 
            display: block; 
            flex-grow: 1; 
            width: 100%; 
            height: 100%;
            max-height: calc(100vh - 120px - env(safe-area-inset-bottom)); 
            border-bottom: 4px solid #333;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            -webkit-touch-callout: none;
            touch-action: none;
        }
        
        .ui-container { 
            height: 120px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            background: #111; 
            padding: 5px; 
            padding-bottom: max(5px, env(safe-area-inset-bottom));
            flex-shrink: 0;
        }
        
        .elixir-container { 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            margin-bottom: 5px; 
            font-size: 14px; 
            font-weight: bold; 
        }
        
        .elixir-bar { 
            width: 100%; 
            height: 12px; 
            background: #444; 
            border-radius: 6px; 
            overflow: hidden; 
            margin-top: 3px; 
        }
        
        .elixir-fill { 
            height: 100%; 
            width: 0%; 
            background: #ca32ca; 
            transition: width 0.1s linear; 
        }
        
        .controls { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            width: 100%; 
            flex-wrap: wrap;
        }
        
        .card { 
            padding: 10px 15px; 
            font-size: 14px; 
            cursor: pointer; 
            font-weight: bold; 
            background: #333; 
            color: white; 
            border: 3px solid #555; 
            border-radius: 8px; 
            text-align: center; 
            min-width: 110px;
            -webkit-appearance: none;
            appearance: none;
            active-color: transparent;
            tap-highlight-color: transparent;
            transition: all 0.2s ease;
            user-select: none;
        }
        
        .card:active { 
            transform: scale(0.95);
        }
        
        .card.selected { 
            border-color: #00ffcc; 
            background: #444; 
            box-shadow: 0 0 10px #00ffcc; 
        }
        
        .toast { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: rgba(51, 51, 51, 0.95); 
            color: #fff; 
            padding: 12px 20px; 
            border-radius: 8px; 
            font-size: 12px; 
            z-index: 1000; 
            opacity: 0; 
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
        }
        
        .toast.show { 
            opacity: 1; 
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-container">
        <div class="elixir-container">
            Elixir: <span id="elixir-text">0</span>/10
            <div class="elixir-bar"><div id="elixir-fill"></div></div>
        </div>
        <div class="controls">
            <div id="card-guerreiro" class="card">Guerreiro<br>(Custo: 3)</div>
            <div id="card-gigante" class="card">Gigante<br>(Custo: 5)</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('✓ Service Worker registrado'))
                .catch(err => console.log('✗ Erro ao registrar SW:', err));
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            showToast('💾 Toque no menu para instalar o jogo');
        });

        function showToast(msg, duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false, antialias: false });

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            ctx.scale(dpr, dpr);
        }

        let playerElixir = 0;
        let enemyElixir = 0;
        let selectedRep = null;

        let myTroops = [];
        let enemyTroops = [];
        let enemyProjectiles = []; 
        
        let playerTower, enemyTower;
        let canvasWidth, canvasHeight;

        function initTowers() {
            canvasWidth = canvas.getBoundingClientRect().width;
            canvasHeight = canvas.getBoundingClientRect().height;
            
            playerTower = { x: canvasWidth / 2, y: canvasHeight - 50, hp: 1000, maxHp: 1000, color: '#2196F3' };
            enemyTower = { 
                x: canvasWidth / 2, y: 50, hp: 1000, maxHp: 1000, color: '#F44336',
                range: 150, fireRate: 40, lastShot: 0 
            };
        }

        const troopTypes = {
            guerreiro: { cost: 3, hp: 120, speed: 1.6, radius: 8, color: '#00bcd4', enemyColor: '#e91e63', damage: 1.5, range: 15 },
            gigante: { cost: 5, hp: 400, speed: 0.7, radius: 14, color: '#ff9800', enemyColor: '#ff5722', damage: 0.8, range: 22 }
        };

        function selectCard(type) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            if (selectedRep === type || type === null) {
                selectedRep = null;
            } else {
                selectedRep = type;
                document.getElementById(`card-${type}`).classList.add('selected');
            }
        }

        document.getElementById('card-guerreiro').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('guerreiro'); });
        document.getElementById('card-gigante').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('gigante'); });

        canvas.addEventListener('pointerdown', function(event) {
            if (!selectedRep) return;

            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            const config = troopTypes[selectedRep];
            const midpoint = rect.height / 2;
            
            if (mouseY > midpoint && playerElixir >= config.cost) {
                playerElixir -= config.cost;
                updateUI();
                
                myTroops.push({
                    x: mouseX, y: mouseY,
                    hp: config.hp, maxHp: config.hp,
                    speed: config.speed, radius: config.radius,
                    damage: config.damage, range: config.range,
                    color: config.color, isPlayer: true
                });

                selectCard(null);
            }
        }, { passive: false });

        setInterval(() => {
            if (playerElixir < 10) { playerElixir = Math.min(10, playerElixir + 0.1); updateUI(); }
            if (enemyElixir < 10) { enemyElixir = Math.min(10, enemyElixir + 0.08); }
        }, 100);

        function updateUI() {
            document.getElementById("elixir-text").innerText = Math.floor(playerElixir);
            document.getElementById("elixir-fill").style.width = (playerElixir / 10 * 100) + "%";
        }

        function getDistance(x1, y1, x2, y2) { return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2); }

        function enemyAI() {
            if (enemyTower.hp <= 0) return;
            let hasGigante = myTroops.some(t => t.radius > 10);
            
            if (hasGigante && enemyElixir >= 3) {
                enemyElixir -= 3;
                enemyTroops.push(createEnemy('guerreiro'));
            } else if (enemyElixir >= 5 && Math.random() < 0.02) {
                enemyElixir -= 5;
                enemyTroops.push(createEnemy(Math.random() > 0.5 ? 'gigante' : 'guerreiro'));
            }
        }

        function createEnemy(type) {
            const config = troopTypes[type];
            return {
                x: enemyTower.x + (Math.random() * (canvasWidth * 0.6) - (canvasWidth * 0.3)),
                y: enemyTower.y + 40,
                hp: config.hp, maxHp: config.hp,
                speed: config.speed, radius: config.radius,
                damage: config.damage, range: config.range,
                color: config.enemyColor, isPlayer: false
            };
        }

        function updateTroopList(allies, enemies, targetTower) {
            for (let i = allies.length - 1; i >= 0; i--) {
                let t = allies[i];
                if (t.hp <= 0) { allies.splice(i, 1); continue; }

                let closestEnemy = null;
                let closestDist = Infinity;

                for (let e of enemies) {
                    let dist = getDistance(t.x, t.y, e.x, e.y);
                    if (dist < closestDist) { closestDist = dist; closestEnemy = e; }
                }

                let distToTower = getDistance(t.x, t.y, targetTower.x, targetTower.y);

                if (closestEnemy && closestDist < 140) { 
                    if (closestDist > t.range) {
                        let angle = Math.atan2(closestEnemy.y - t.y, closestEnemy.x - t.x);
                        t.x += Math.cos(angle) * t.speed; t.y += Math.sin(angle) * t.speed;
                    } else { closestEnemy.hp -= t.damage; }
                } else if (targetTower.hp > 0 && distToTower > 35) {
                    let angle = Math.atan2(targetTower.y - t.y, targetTower.x - t.x);
                    t.x += Math.cos(angle) * t.speed; t.y += Math.sin(angle) * t.speed;
                } else if (targetTower.hp > 0) {
                    targetTower.hp -= t.damage;
                    if (targetTower.hp <= 0) targetTower.hp = 0;
                } else {
                    t.y += t.isPlayer ? -t.speed : t.speed;
                }

                ctx.fillStyle = t.color;
                ctx.beginPath(); ctx.arc(t.x, t.y, t.radius, 0, Math.PI * 2); ctx.fill();

                ctx.fillStyle = "#333";
                ctx.fillRect(t.x - t.radius, t.y - t.radius - 8, t.radius * 2, 4);
                ctx.fillStyle = t.isPlayer ? "#4CAF50" : "#ff3333";
                ctx.fillRect(t.x - t.radius, t.y - t.radius - 8, (t.hp / t.maxHp) * (t.radius * 2), 4);
            }
        }

        function gameLoop() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            ctx.strokeStyle = "rgba(255,255,255,0.3)"; 
            ctx.lineWidth = 4;
            ctx.beginPath(); 
            ctx.moveTo(0, rect.height / 2); 
            ctx.lineTo(rect.width, rect.height / 2); 
            ctx.stroke();

            enemyAI();
            drawTower(playerTower);
            drawTower(enemyTower);

            updateTroopList(myTroops, enemyTroops, enemyTower);
            updateTroopList(enemyTroops, myTroops, playerTower);

            if (enemyTower.hp > 0) {
                enemyTower.lastShot++;
                let target = null; 
                let closestDist = enemyTower.range;
                for (let t of myTroops) {
                    let dist = getDistance(enemyTower.x, enemyTower.y, t.x, t.y);
                    if (dist < closestDist) { closestDist = dist; target = t; }
                }
                if (target && enemyTower.lastShot >= enemyTower.fireRate) {
                    enemyProjectiles.push({ x: enemyTower.x, y: enemyTower.y, target: target, speed: 5, damage: 20 });
                    enemyTower.lastShot = 0;
                }
            }

            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                let p = enemyProjectiles[i];
                if (!myTroops.includes(p.target)) { enemyProjectiles.splice(i, 1); continue; }
                let angle = Math.atan2(p.target.y - p.y, p.target.x - p.x);
                p.x += Math.cos(angle) * p.speed; 
                p.y += Math.sin(angle) * p.speed;
                ctx.fillStyle = "#ffeb3b";
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2); 
                ctx.fill();
                if (getDistance(p.x, p.y, p.target.x, p.target.y) < p.target.radius) {
                    p.target.hp -= p.damage; 
                    enemyProjectiles.splice(i, 1);
                }
            }

            if (playerTower.hp <= 0) {
                ctx.fillStyle = "red"; 
                ctx.font = "bold 24px Arial"; 
                ctx.textAlign = "center"; 
                ctx.fillText("VOCÊ PERDEU!", rect.width / 2, rect.height / 2);
            } else if (enemyTower.hp <= 0) {
                ctx.fillStyle = "gold"; 
                ctx.font = "bold 24px Arial"; 
                ctx.textAlign = "center"; 
                ctx.fillText("VITÓRIA!", rect.width / 2, rect.height / 2);
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        function drawTower(tower) {
            if (tower.hp <= 0) return;
            ctx.fillStyle = tower.color; 
            ctx.fillRect(tower.x - 25, tower.y - 25, 50, 50);
            ctx.fillStyle = "#333"; 
            ctx.fillRect(tower.x - 25, tower.y - 38, 50, 6);
            ctx.fillStyle = "#4CAF50"; 
            ctx.fillRect(tower.x - 25, tower.y - 38, (tower.hp / tower.maxHp) * 50, 6);
        }

        window.addEventListener('resize', () => {
            resizeCanvas();
            initTowers();
        });

        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        resizeCanvas();
        initTowers();
        gameLoop();
    </script>
</body>
</html>
