<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Mini Clash Premium - Jogo de estratégia com Clash Royale style">
    <meta name="theme-color" content="#222">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mini Clash">
    
    <title>Mini Clash Premium</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            position: fixed;
            overflow: hidden;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: max(0px, env(safe-area-inset-top)) 0 0 0;
            height: 100vh;
        }

        .header {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #ffd700;
            padding-top: max(12px, env(safe-area-inset-top));
        }

        .header-left, .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .tower-hp {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .hp-bar {
            width: 80px;
            height: 12px;
            background: #333;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid #666;
        }

        .hp-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.3s ease;
        }

        .hp-fill.danger {
            background: linear-gradient(90deg, #f44336, #ff6b6b);
        }

        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        canvas {
            background: linear-gradient(180deg, #45a049 0%, #2d7a3a 50%, #1a4d2e 100%);
            flex: 1;
            width: 100%;
            touch-action: none;
            image-rendering: crisp-edges;
            border-bottom: 3px solid #333;
        }

        .controls {
            background: rgba(0, 0, 0, 0.85);
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            border-top: 3px solid #ffd700;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            background: linear-gradient(135deg, #2a2a3e 0%, #1a1a2e 100%);
            border: 3px solid #555;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 85px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            -webkit-appearance: none;
        }

        .card-emoji {
            font-size: 32px;
            margin-bottom: 5px;
        }

        .card:active {
            transform: scale(0.95);
        }

        .card.selected {
            border-color: #ffd700;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .card-cost {
            background: #ca32ca;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .elixir-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            padding: 0 10px;
            width: 100%;
        }

        .elixir-bar {
            flex: 1;
            height: 10px;
            background: #333;
            border-radius: 5px;
            overflow: hidden;
            border: 2px solid #666;
        }

        .elixir-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ca32ca, #ff1493);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(202, 50, 202, 0.8);
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(10px);
            border: 3px solid #ffd700;
            font-weight: bold;
        }

        .toast.show {
            opacity: 1;
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="tower-hp">
                💙 <span id="playerHp">1000</span>
                <div class="hp-bar">
                    <div id="playerHpBar" class="hp-fill"></div>
                </div>
            </div>
        </div>
        <div class="title">⚔️ MINI CLASH PREMIUM ⚔️</div>
        <div class="header-right">
            <div class="tower-hp">
                <div class="hp-bar">
                    <div id="enemyHpBar" class="hp-fill"></div>
                </div>
                <span id="enemyHp">1000</span> ❤️
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="elixir-bar-container">
            <span style="font-size: 14px;">⚡ Elixir:</span>
            <div class="elixir-bar">
                <div id="elixirFill" class="elixir-fill"></div>
            </div>
            <span id="elixirText" style="min-width: 30px; text-align: right; font-weight: bold;">0/10</span>
        </div>
        <div id="card-knight" class="card">
            <div class="card-emoji">🗡️</div>
            <div>Cavaleiro</div>
            <div class="card-cost">3</div>
        </div>
        <div id="card-giant" class="card">
            <div class="card-emoji">🛡️</div>
            <div>Gigante</div>
            <div class="card-cost">5</div>
        </div>
        <div id="card-archer" class="card">
            <div class="card-emoji">🏹</div>
            <div>Arqueiro</div>
            <div class="card-cost">3</div>
        </div>
        <div id="card-bomb" class="card">
            <div class="card-emoji">💣</div>
            <div>Bomba</div>
            <div class="card-cost">6</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(frequency, duration, type = 'sine', volume = 0.3) {
            try {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                osc.type = type;
                gain.gain.setValueAtTime(volume, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + duration);
            } catch(e) {}
        }

        const sounds = {
            spawn: () => playSound(400, 0.1, 'sine', 0.2),
            hit: () => playSound(200, 0.15, 'sine', 0.25),
            victory: () => {
                playSound(523, 0.2, 'sine', 0.3);
                setTimeout(() => playSound(659, 0.2, 'sine', 0.3), 150);
                setTimeout(() => playSound(784, 0.3, 'sine', 0.3), 300);
            },
            defeat: () => {
                playSound(200, 0.3, 'sine', 0.3);
                setTimeout(() => playSound(150, 0.3, 'sine', 0.3), 200);
            },
            select: () => playSound(800, 0.1, 'sine', 0.2)
        };

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d", { alpha: false });

        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
        }

        let playerElixir = 0;
        let enemyElixir = 0;
        let selectedUnit = null;
        let myTroops = [];
        let enemyTroops = [];
        let playerTower, enemyTower;
        let canvasWidth, canvasHeight;
        let gameOver = false;
        let particles = [];

        const unitTypes = {
            knight: { cost: 3, hp: 150, speed: 2, radius: 10, color: '#00bcd4', emoji: '🗡️', damage: 2.5, range: 20, attackSpeed: 1 },
            giant: { cost: 5, hp: 400, speed: 0.8, radius: 16, color: '#ff9800', emoji: '🛡️', damage: 4, range: 25, attackSpeed: 1.5 },
            archer: { cost: 3, hp: 80, speed: 2.2, radius: 8, color: '#4CAF50', emoji: '🏹', damage: 3, range: 80, attackSpeed: 2 },
            bomb: { cost: 6, hp: 120, speed: 0.5, radius: 12, color: '#ff5252', emoji: '💣', damage: 8, range: 40, attackSpeed: 0.8, aoe: 50 }
        };

        function initTowers() {
            canvasWidth = canvas.getBoundingClientRect().width;
            canvasHeight = canvas.getBoundingClientRect().height;
            playerTower = { x: canvasWidth / 2, y: canvasHeight - 40, hp: 1000, maxHp: 1000, color: '#2196F3' };
            enemyTower = { x: canvasWidth / 2, y: 40, hp: 1000, maxHp: 1000, color: '#F44336', lastShot: 0 };
        }

        function selectCard(type) {
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            if (selectedUnit === type) {
                selectedUnit = null;
            } else {
                selectedUnit = type;
                document.getElementById(`card-${type}`).classList.add('selected');
                sounds.select();
            }
        }

        document.getElementById('card-knight').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('knight'); });
        document.getElementById('card-giant').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('giant'); });
        document.getElementById('card-archer').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('archer'); });
        document.getElementById('card-bomb').addEventListener('pointerdown', (e) => { e.stopPropagation(); selectCard('bomb'); });

        canvas.addEventListener('pointerdown', (event) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            const distToEnemy = Math.hypot(x - enemyTower.x, y - enemyTower.y);
            if (distToEnemy < 50 && playerElixir >= 4) {
                playerElixir -= 4;
                enemyTower.hp -= 100;
                createExplosion(enemyTower.x, enemyTower.y);
                sounds.hit();
                updateUI();
                return;
            }

            if (!selectedUnit) return;
            const config = unitTypes[selectedUnit];
            const midpoint = canvasHeight / 2;

            if (y > midpoint && playerElixir >= config.cost) {
                playerElixir -= config.cost;
                sounds.spawn();
                myTroops.push({
                    x, y, hp: config.hp, maxHp: config.hp, speed: config.speed, radius: config.radius,
                    color: config.color, emoji: config.emoji, damage: config.damage, range: config.range,
                    attackSpeed: config.attackSpeed, lastAttack: 0, isPlayer: true, type: selectedUnit, aoe: config.aoe || 0
                });
                selectCard(null);
                updateUI();
            }
        }, { passive: false });

        setInterval(() => {
            if (playerElixir < 10) playerElixir += 0.15;
            if (enemyElixir < 10) enemyElixir += 0.1;
            if (playerElixir > 10) playerElixir = 10;
            if (enemyElixir > 10) enemyElixir = 10;
            updateUI();
        }, 100);

        function updateUI() {
            document.getElementById('elixirText').innerText = Math.floor(playerElixir) + '/10';
            document.getElementById('elixirFill').style.width = (playerElixir / 10 * 100) + '%';
            document.getElementById('playerHp').innerText = Math.max(0, Math.floor(playerTower.hp));
            document.getElementById('enemyHp').innerText = Math.max(0, Math.floor(enemyTower.hp));

            const playerHpPercent = Math.max(0, playerTower.hp / playerTower.maxHp * 100);
            document.getElementById('playerHpBar').style.width = playerHpPercent + '%';
            if (playerHpPercent < 30) document.getElementById('playerHpBar').classList.add('danger');

            const enemyHpPercent = Math.max(0, enemyTower.hp / enemyTower.maxHp * 100);
            document.getElementById('enemyHpBar').style.width = enemyHpPercent + '%';
            if (enemyHpPercent < 30) document.getElementById('enemyHpBar').classList.add('danger');
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x, y, vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4 - 1, life: 0.5,
                    color: ['#ff6b6b', '#ffd700', '#ff9800'][Math.floor(Math.random() * 3)]
                });
            }
        }

        function enemyAI() {
            if (enemyTower.hp <= 0) return;
            let hasGiant = myTroops.some(t => t.type === 'giant');
            if (hasGiant && enemyElixir >= 3) {
                enemyElixir -= 3;
                spawnEnemy('knight');
            } else if (enemyElixir >= 5 && Math.random() < 0.02) {
                enemyElixir -= 5;
                spawnEnemy(['knight', 'giant', 'archer'][Math.floor(Math.random() * 3)]);
            }
        }

        function spawnEnemy(type) {
            const config = unitTypes[type];
            enemyTroops.push({
                x: enemyTower.x + (Math.random() * canvasWidth * 0.4 - canvasWidth * 0.2),
                y: enemyTower.y + 50,
                hp: config.hp, maxHp: config.hp, speed: config.speed, radius: config.radius,
                color: config.color, emoji: config.emoji, damage: config.damage, range: config.range,
                attackSpeed: config.attackSpeed, lastAttack: 0, isPlayer: false, type: type, aoe: config.aoe || 0
            });
        }

        function drawUnit(unit) {
            ctx.fillStyle = unit.color;
            ctx.beginPath();
            ctx.arc(unit.x, unit.y, unit.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = '#fff';
            ctx.font = `${unit.radius * 1.5}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(unit.emoji, unit.x, unit.y);

            ctx.fillStyle = '#333';
            ctx.fillRect(unit.x - unit.radius, unit.y - unit.radius - 10, unit.radius * 2, 4);
            ctx.fillStyle = unit.isPlayer ? '#4CAF50' : '#ff3333';
            ctx.fillRect(unit.x - unit.radius, unit.y - unit.radius - 10, (unit.hp / unit.maxHp) * unit.radius * 2, 4);
        }

        function updateUnits(allies, enemies, targetTower) {
            for (let i = allies.length - 1; i >= 0; i--) {
                let u = allies[i];
                if (u.hp <= 0) { allies.splice(i, 1); continue; }

                let target = null, minDist = Infinity;
                for (let e of enemies) {
                    let d = Math.hypot(e.x - u.x, e.y - u.y);
                    if (d < minDist) { minDist = d; target = e; }
                }

                let distToTower = Math.hypot(targetTower.x - u.x, targetTower.y - u.y);

                if (target && minDist < 150) {
                    if (minDist > u.range) {
                        let angle = Math.atan2(target.y - u.y, target.x - u.x);
                        u.x += Math.cos(angle) * u.speed;
                        u.y += Math.sin(angle) * u.speed;
                    } else {
                        u.lastAttack++;
                        if (u.lastAttack > 30 / u.attackSpeed) {
                            target.hp -= u.damage;
                            sounds.hit();
                            if (u.aoe) {
                                for (let e of enemies) {
                                    if (Math.hypot(e.x - target.x, e.y - target.y) < u.aoe) {
                                        e.hp -= u.damage * 0.5;
                                    }
                                }
                                createExplosion(target.x, target.y);
                            }
                            u.lastAttack = 0;
                        }
                    }
                } else if (targetTower.hp > 0 && distToTower > 40) {
                    let angle = Math.atan2(targetTower.y - u.y, targetTower.x - u.x);
                    u.x += Math.cos(angle) * u.speed;
                    u.y += Math.sin(angle) * u.speed;
                } else if (targetTower.hp > 0) {
                    u.lastAttack++;
                    if (u.lastAttack > 30 / u.attackSpeed) {
                        targetTower.hp -= u.damage;
                        sounds.hit();
                        u.lastAttack = 0;
                    }
                }
                drawUnit(u);
            }
        }

        function drawTower(tower) {
            if (tower.hp <= 0) return;
            ctx.fillStyle = tower.color;
            ctx.fillRect(tower.x - 30, tower.y - 30, 60, 60);
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 3;
            ctx.strokeRect(tower.x - 30, tower.y - 30, 60, 60);
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🏰', tower.x, tower.y);
        }

        function gameLoop() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            if (!gameOver) {
                enemyAI();
                updateUnits(myTroops, enemyTroops, enemyTower);
                updateUnits(enemyTroops, myTroops, playerTower);
            }

            drawTower(playerTower);
            drawTower(enemyTower);

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.016;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                if (p.life <= 0) particles.splice(i, 1);
            }

            updateUI();

            if (playerTower.hp <= 0 && !gameOver) {
                gameOver = true;
                sounds.defeat();
                showToast('😢 VOCÊ PERDEU!', 'red');
            } else if (enemyTower.hp <= 0 && !gameOver) {
                gameOver = true;
                sounds.victory();
                showToast('🎉 VITÓRIA!', 'gold');
            } else {
                requestAnimationFrame(gameLoop);
            }
        }

        function showToast(text, color = 'gold') {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.style.color = color;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.addEventListener('resize', () => { resizeCanvas(); initTowers(); });
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        resizeCanvas();
        initTowers();
        gameLoop();
    </script>
</body>
</html>
